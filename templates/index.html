<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shorty - URL Shortener</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center h-screen">
    <div class="bg-white p-8 rounded-lg shadow-md w-full max-w-md">
        <h1 class="text-2xl font-bold mb-4 text-center text-blue-600">Shorty URL</h1>
        
        <form id="shorten-form" class="space-y-4">
            <input type="url" id="url-input" placeholder="Paste your long link here..." required
                class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
            <button type="submit" 
                class="w-full bg-blue-600 text-white py-2 rounded-lg hover:bg-blue-700 transition">
                Shorten!
            </button>
        </form>

        <div id="result" class="mt-6 hidden border-t pt-4">
            <p class="text-sm text-gray-600">Your short link:</p>
            <div class="flex items-center space-x-2">
                <input type="text" id="short-url-output" readonly 
                    class="w-full p-2 bg-gray-50 border rounded text-blue-600 font-mono text-sm">
            </div>
        </div>
    </div>

    <script>
        document.getElementById('shorten-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const url = document.getElementById('url-input').value;
            const res = await fetch('/urls', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ url: url })
            });
            const data = await res.json();
            if (data.short_url) {
                document.getElementById('result').classList.remove('hidden');
                document.getElementById('short-url-output').value = data.short_url;
            }
        });
    </script>
</body>
</html>
